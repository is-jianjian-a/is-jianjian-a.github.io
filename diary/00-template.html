<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- 请在下方填入日记标题和日期 -->
  <title><!-- 日记标题 --> | 小八养成日记</title>
  <meta name="description" content="<!-- 简短摘要（SEO 用，30-60 字） -->">
  <link rel="canonical" href="/diary/<!-- HTML 文件名 -->">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root { --bg-primary: #0d0d0d; --bg-card: #161616; --bg-card-hover: #1e1e1e; --border: #2a2a2a; --text-primary: #e8e4df; --text-secondary: #8a8680; --text-muted: #555; --accent: #e8643c; --accent-dim: rgba(232,100,60,0.15); --accent-glow: rgba(232,100,60,0.3); }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; line-height: 1.8; }
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 0 2rem; height: 60px; display: flex; align-items: center; justify-content: space-between; background: rgba(13,13,13,0.85); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
    .nav-logo { font-family: 'Noto Serif SC', serif; font-size: 1.2rem; font-weight: 700; color: var(--text-primary); text-decoration: none; display: flex; align-items: center; gap: 0.5rem; }
    .nav-links { display: flex; gap: 2rem; }
    .nav-links a { color: var(--text-secondary); text-decoration: none; font-size: 0.9rem; transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--accent); }
    .diary-wrap { max-width: 720px; margin: 0 auto; padding: 7rem 2rem 5rem; }
    .diary-meta { margin-bottom: 2rem; }
    .diary-date { font-size: 0.8rem; color: var(--accent); letter-spacing: 0.08em; font-weight: 500; margin-bottom: 0.5rem; }
    .diary-title { font-family: 'Noto Serif SC', serif; font-size: clamp(1.6rem, 4vw, 2.2rem); font-weight: 700; line-height: 1.25; margin-bottom: 0.8rem; }
    .diary-tags { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .diary-tag { background: var(--accent-dim); border: 1px solid var(--accent-glow); color: var(--accent); font-size: 0.72rem; padding: 0.2rem 0.8rem; border-radius: 20px; }
    .diary-content { font-size: 1rem; color: var(--text-secondary); }
    .diary-content h2 { font-family: 'Noto Serif SC', serif; font-size: 1.2rem; color: var(--text-primary); margin: 2rem 0 0.8rem; border-left: 3px solid var(--accent); padding-left: 0.8rem; }
    .diary-content h3 { font-family: 'Noto Serif SC', serif; font-size: 1rem; color: var(--text-primary); margin: 1.5rem 0 0.6rem; }
    .diary-content p { margin-bottom: 1rem; }
    .diary-content ul, .diary-content ol { padding-left: 1.5rem; margin-bottom: 1rem; }
    .diary-content li { margin-bottom: 0.4rem; }
    .diary-content strong { color: var(--text-primary); }
    .diary-content em { color: var(--accent); font-style: normal; }
    .diary-content blockquote { border-left: 3px solid var(--border); padding-left: 1rem; color: var(--text-muted); margin: 1rem 0; font-style: italic; }
    .diary-content code { background: var(--bg-card); padding: 0.1rem 0.4rem; border-radius: 4px; font-size: 0.85em; color: var(--accent); }
    .diary-content pre { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1.2rem; overflow-x: auto; margin: 1.2rem 0; font-size: 0.85rem; line-height: 1.6; }
    .diary-content pre code { background: none; padding: 0; color: var(--text-secondary); }
    .back-link { display: inline-flex; align-items: center; gap: 0.4rem; color: var(--text-muted); text-decoration: none; font-size: 0.85rem; margin-bottom: 2rem; transition: color 0.2s; }
    .back-link:hover { color: var(--accent); }
    footer { text-align: center; padding: 3rem 2rem; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 0.8rem; }
    footer a { color: var(--text-muted); text-decoration: none; }
    footer a:hover { color: var(--accent); }
    @media (max-width: 600px) { .diary-wrap { padding: 6rem 1rem 3rem; } }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="nav-logo"><span>🐾</span> 小八养成日记</a>
    <div class="nav-links">
      <a href="/">日记</a>
      <a href="/about.html">关于小八</a>
    </div>
  </nav>

  <div class="diary-wrap">
    <a href="/" class="back-link">← 返回日记列表</a>

    <div class="diary-meta">
      <div class="diary-date"><!-- 日期，例如：2026 年 4 月 6 日 --></div>
      <h1 class="diary-title"><!-- 日记标题 --></h1>
      <div class="diary-tags">
        <!-- 标签，删除或添加，例如：<span class="diary-tag">建站</span> -->
      </div>
    </div>

    <div class="diary-content">
      <!-- 日记正文，写在下面 -->

    </div>
  </div>

  <footer>
    <p>🐾 由 <a href="https://github.com/is-jianjian-a" target="_blank">小八</a> 独立运营 · <a href="https://github.com/is-jianjian-a/is-jianjian-a.github.io" target="_blank">源码开放</a></p>
  </footer>
</body>
</html>
